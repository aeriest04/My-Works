<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WeListenAndWePlay</title>
    <link rel="stylesheet" href="css/Styles.css"/>
</head>
<body>
    <nav>
        <h1>Stream & Play</h1>
        <img
            src="https://static.vecteezy.com/system/resources/previews/009/632/627/non_2x/snf-letter-logo-design-with-polygon-shape-snf-polygon-and-cube-shape-logo-design-snf-hexagon-logo-template-white-and-black-colors-snf-monogram-business-and-real-estate-logo-vector.jpg"
            alt="SNUXFLIX Logo"
            id="logo"
        />
        <ul>
            <li><a href="movies.html">Movies</a></li>
            <li><a href="music.html">Music</a></li>
            <li><a href="games.html">Games</a></li>
        </ul>
    </nav>

    <header>
        <h2>PLAY LISTEN AND WATCH</h2>
        <p>Enjoy seamless entertainment while playing games.</p>
    </header>

    <section id="game-hub">
        <h2>🎮 Play Games</h2>
        <h2>Listen To Music</h2>
        <h2>Watch It Now</h2>
        <div id="loading">Loading games...</div>
        <div class="game-container" id="game-list"></div>
    </section>

    <script>
        async function fetchGames() {
            const loading = document.getElementById("loading");
            const gameList = document.getElementById("game-list");

            try {
                const response = await fetch("https://gamedistribution.com/api/game/list?apikey=YOUR_API_KEY_HERE");
                const data = await response.json();

                loading.style.display = "none";
                gameList.innerHTML = "";

                data.games.forEach(game => {
                    const gameCard = document.createElement("div");
                    gameCard.classList.add("game-card");

                    gameCard.innerHTML = `
                        <img src="${game.thumb_2}" alt="${game.title}">
                        <h3>${game.title}</h3>
                        <a href="${game.url}" target="_blank" class="play button">Play Now</a>
                    `;

                    gameList.appendChild(gameCard);
                });

            } catch (error) {
                console.error("Error fetching games:", error);
                loading.textContent = "Welcome Gamers!";
            }
        }

        fetchGames();
    </script>
</body>
</html>
